spring.application.name=api

# --- Database (Neon PostgreSQL) ---
spring.datasource.url=${NEON_DATABASE_URL:jdbc:postgresql://localhost:5432/cupboard}
spring.datasource.username=${NEON_DATABASE_USERNAME:postgres}
spring.datasource.password=${NEON_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=${JWT_SECRET:changeme-replace-with-a-256-bit-secret}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Stripe ---
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}

# --- Claude API ---
claude.api-key=${CLAUDE_API_KEY:placeholder}
